# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard -> New -> Blueprint -> connect this repo

services:
  - type: web
    name: trajectory-predictor
    runtime: python
    plan: free
    region: singapore
    buildCommand: bash scripts/render-build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: NODE_VERSION
        value: "22.12.0"
